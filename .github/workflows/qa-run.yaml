name: Deploy Query server to QA
on:
  push:
    branches:
      - qa
    paths:
      - '**'
      - '!**.md'
      - '!.blackbox/**'

env:
  VO_UTIL2_KUBECONF: ${{ secrets.VO_UTIL2_KUBECONF }}
  PBKED_KUBECONF: ${{ secrets.PBKED_KUBECONF }}
  PBKEI_KUBECONF: ${{ secrets.PBKEI_KUBECONF }}
  QBKEI_KUBECONF: ${{ secrets.QBKEI_KUBECONF }}
  QBKED_KUBECONF: ${{ secrets.QBKED_KUBECONF }}
  QA_VO_UTIL_KUBECONF: ${{ secrets.QA_VO_UTIL_KUBECONF }}
  DRBKED_KUBECONF: ${{ secrets.DRBKED_KUBECONF }}
  DRBKEI_KUBECONF: ${{ secrets.DRBKEI_KUBECONF }}
  DR_VOUTIL2: ${{ secrets.DR_VOUTIL2 }}
  QVO_HARBOR_ROBOT: ${{ secrets.QVO_HARBOR_ROBOT }}
  ROBOT_QA: ${{ secrets.ROBOT_QA }}

jobs:
  QA_K8S_Query:
    runs-on: [self-hosted, qa-ghrunner]
    steps:
      -
        name: Checkout
        uses: actions/checkout@v3
      -
        name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@111c56156bcc6918c056dbef52164cfa583dc549
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
      -
        name: Get kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.30.0
      -
        name: pull kubeconfig
        run: |
          mkdir secrets
          touch secrets/qa-bkei.yaml ; echo "$QBKEI_KUBECONF" > secrets/qa-bkei.yaml
          touch secrets/qa-bked.yaml ; echo "$QBKED_KUBECONF" > secrets/qa-bked.yaml
          touch secrets/prod-bkei.yaml ; echo "$PBKEI_KUBECONF" > secrets/prod-bkei.yaml
          touch secrets/prod-bked.yaml ; echo "$PBKED_KUBECONF" > secrets/prod-bked.yaml
          touch secrets/dr-bkei.yaml ; echo "$DRBKEI_KUBECONF" > secrets/dr-bkei.yaml
          touch secrets/dr-bkpd.yaml ; echo "$DRBKED_KUBECONF" > secrets/dr-bked.yaml
          touch secrets/qa-voutil2.yaml ; echo "$QA_VO_UTIL_KUBECONF" > secrets/qa-voutil2.yaml
          touch secrets/voutil2.yaml ; echo "$VO_UTIL2_KUBECONF" > secrets/voutil2.yaml
          touch secrets/dr-voutil2.yaml ; echo "$DR_VOUTIL2" > secrets/dr-voutil2.yaml
          touch secrets/robot-qa.txt ; echo "$ROBOT_QA" > secrets/robot-qa.txt
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true
      -
        name: Build QA image
        run: make build
      -
        name: Push QA image
        run: make push.qa
      -
        name: Deploy QA app
        run: make deploy.qa
